<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 60" width="220" height="60" role="img" aria-label="Ceylon PrimeLink Holdings logo">
  <defs>
    <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e88e5"/>
      <stop offset="100%" stop-color="#0a3d62"/>
    </linearGradient>
  </defs>
  <!-- Icon mark -->
  <rect x="2" y="8" width="44" height="44" rx="8" fill="url(#lg)"/>
  <circle cx="24" cy="30" r="12" fill="none" stroke="white" stroke-width="2.5"/>
  <line x1="16" y1="30" x2="32" y2="30" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="24" y1="22" x2="24" y2="38" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- P letter accent -->
  <rect x="36" y="26" width="6" height="2.5" rx="1.25" fill="#f39c12"/>
  <rect x="36" y="31.5" width="4" height="2" rx="1" fill="#f39c12"/>
  <!-- Text: PrimeLink -->
  <text x="56" y="27" font-family="Montserrat,Arial,sans-serif" font-size="15" font-weight="800" fill="#0a3d62" letter-spacing="0.5">PRIMELINK</text>
  <!-- Text: Holdings -->
  <text x="56" y="43" font-family="Montserrat,Arial,sans-serif" font-size="9.5" font-weight="600" fill="#555555" letter-spacing="2">HOLDINGS</text>
  <!-- Accent underline -->
  <rect x="56" y="47" width="52" height="2" rx="1" fill="#f39c12"/>
</svg>
